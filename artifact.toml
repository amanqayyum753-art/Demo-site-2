kind = "web"
previewPath = "/"
title = "Studio Site"
version = "1.0.0"
id = "artifacts/luxury-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20196

[services.development]
run = "pnpm --filter @workspace/luxury-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luxury-site", "run", "build" ]
publicDir = "artifacts/luxury-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20196"
BASE_PATH = "/"
